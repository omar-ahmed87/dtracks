[build]
  publish = "frontend"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  included_files = ["templates/**"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
